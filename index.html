<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Morgen-Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Mein Morgen-Dashboard</h1>

    <div class="dashboard-container">

        <div class="box" id="wetter-box">
            <h2>Wetter</h2>
            <div id="wetter-inhalt">
                <p id="wetter-stadt">Lade Stadt...</p>
                <h3 id="wetter-temp">-- °C</h3>
                <p id="wetter-beschreibung">Bitte warten...</p>
            </div>
        </div>

        <!-- TO-DO BOX -->
        <div class="box" id="todo-box">
            <h2>Meine To-Dos</h2>
            <div class="todo-input-container">
                <input type="text" id="todo-input" placeholder="Neue Aufgabe...">
                <button onclick="addTodo()">Hinzufügen</button>
            </div>
            <ul id="todo-list"></ul>
        </div>

        <!-- NEWS BOX -->
        <div class="box" id="news-box">
            <h2>Aktuelle News</h2>
            <ul id="news-liste">
                <li>Lade aktuelle Schlagzeilen...</li>
            </ul>
        </div>



    <!-- Verbindung zur JavaScript-Datei -->
    <script src="script.js"></script>
</body>
</html>
